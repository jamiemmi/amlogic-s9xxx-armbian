# ==============================================================
# Panther-X2 (RK3566) sysctl 运行时调优
# 部署方法：
#   sudo cp 99-panther-x2.conf /etc/sysctl.d/
#   sudo sysctl --system
# ==============================================================

# ── 虚拟内存 / 脏页回写 ──────────────────────────────────────
# 后台回写触发（占空闲内存百分比），提早回写避免 IO 突发
vm.dirty_background_ratio = 5
# 强制回写上限，防止写缓冲堆积
vm.dirty_ratio = 10
# 脏页最长驻留时间（单位 cs，1cs=0.01s），默认 3000=30s → 改为 5s
vm.dirty_expire_centisecs = 500
# 回写线程唤醒间隔（单位 cs），默认 500=5s → 改为 1s，减少延迟抖动
vm.dirty_writeback_centisecs = 100

# ── 内存压力 ─────────────────────────────────────────────────
# 尽量不 swap，优先把内存给 page cache（eMMC/NVMe 读缓存）
vm.swappiness = 10
# 适当降低 vfs 缓存回收压力，保留更多 dentry/inode 缓存
vm.vfs_cache_pressure = 50

# ── 预读 ─────────────────────────────────────────────────────
# eMMC 顺序读预读 512KB（默认 128KB），大文件场景提升明显
# 如有 NVMe 可在 udev rules 中单独为 nvme0 设置更大值
vm.read_ahead_kb = 512

# ── 文件句柄 / inotify ────────────────────────────────────────
fs.file-max = 2097152
fs.inotify.max_user_watches = 524288
fs.inotify.max_queued_events = 32768

# ── 网络（附加，避免 NFS/Samba 共享成为 IO 瓶颈）────────────
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
# 启用 BBR（需内核已编译 CONFIG_TCP_CONG_BBR=y）
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# ── 调度器建议（写入 udev rules，而非 sysctl）────────────────
# 在 /etc/udev/rules.d/60-ioscheduler.rules 中添加：
#
#   # eMMC → mq-deadline（低延迟，适合随机读写）
#   ACTION=="add|change", KERNEL=="mmcblk[0-9]", \
#     ATTR{queue/scheduler}="mq-deadline"
#
#   # NVMe → none（硬件自带队列管理，不需要软件调度器）
#   ACTION=="add|change", KERNEL=="nvme[0-9]*", \
#     ATTR{queue/scheduler}="none"
#
#   # eMMC 预读单独调大（可选）
#   ACTION=="add|change", KERNEL=="mmcblk[0-9]", \
#     ATTR{bdi/read_ahead_kb}="512"
